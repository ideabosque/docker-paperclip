services:
  db:
    container_name: container-paperclip-db
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip}
      POSTGRES_DB: ${POSTGRES_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${PGDATA_HOST_PATH:-./data/postgres}:/var/lib/postgresql/data"

  server:
    container_name: container-paperclip
    image: ghcr.io/paperclipai/paperclip:latest
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-paperclip}:${POSTGRES_PASSWORD:-paperclip}@db:5432/${POSTGRES_DB:-paperclip}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      USER_UID: "0"
      USER_GID: "0"
    volumes:
      - "${PAPERCLIP_DATA_HOST_PATH:-./data/paperclip}:/paperclip"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:

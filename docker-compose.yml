services:
  # PostgreSQL database
  db:
    container_name: container-paperclip-db
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paperclip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip}
      POSTGRES_DB: ${POSTGRES_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - "${PGDATA_FOLDER:-./www/postgres}:/var/lib/postgresql/data"
    networks:
      - paperclip-network

  # Paperclip (Node + Python runtime on AlmaLinux 10)
  paperclip:
    container_name: container-paperclip
    env_file:
      - .env
    build:
      context: ./python
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL}
        PYTHON: ${PYTHON}
        NODE_VERSION: ${NODE_VERSION}
        PAPERCLIP_BRANCH: ${PAPERCLIP_BRANCH:-master}
        HERMES_BRANCH: ${HERMES_BRANCH:-main}
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-paperclip}:${POSTGRES_PASSWORD:-paperclip}@db:5432/${POSTGRES_DB:-paperclip}
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
    volumes:
      - ./www:/var/www
      - "${PROJECTS_FOLDER:-./www/projects}:/var/www/projects"
      - "${PAPERCLIP_FOLDER:-./www/paperclip}:/paperclip"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paperclip-network
    command: ["supervisord", "-n"]
    restart: unless-stopped

networks:
  paperclip-network:
    driver: bridge
